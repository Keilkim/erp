<div class="sidebar-panel" id="panel-temp">
  <!-- Upload Area -->
  <div class="upload-area" id="upload-drop-zone">
    <span class="upload-area__icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
    </span>
    <span class="upload-area__text">엑셀 파일을 드래그하거나 클릭하세요</span>
    <span class="upload-area__hint">.xlsx, .xls 파일만 가능</span>
    <input type="file" id="file-input-hidden"
           accept=".xlsx,.xls" class="visually-hidden">
  </div>

  <!-- File List -->
  <div class="panel__header">
    <span class="panel__title">임시 저장 문서</span>
    <span class="panel__title" id="temp-count" style="">0</span>
  </div>
  <div class="panel__body">
    <div class="file-list" id="temp-file-list">
      <div class="file-list__empty">
        <span class="file-list__empty-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
        </span>
        <span>업로드된 파일이 없습니다</span>
      </div>
    </div>
  </div>
</div>
