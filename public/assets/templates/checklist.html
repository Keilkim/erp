<div class="checklist-panel" id="checklist-panel">
  <div class="checklist-panel__header" id="checklist-toggle">
    <span class="checklist-panel__title">확인 리스트</span>
    <span class="checklist-panel__toggle" id="checklist-toggle-icon">▼</span>
  </div>
  <div class="checklist-panel__body" id="checklist-body">
    <div class="checklist-panel__empty" id="checklist-empty">
      엑셀 데이터를 불러오면 확인 리스트가 표시됩니다
    </div>
    <table class="checklist-panel__table hidden" id="checklist-table">
      <thead id="checklist-thead"></thead>
      <tbody id="checklist-tbody"></tbody>
    </table>
  </div>
</div>
