<div class="modal-overlay" id="modal-save-confirm">
  <div class="modal modal--sm">
    <div class="modal__header">
      <h2 class="modal__title">임시 저장</h2>
      <button class="modal__close" id="modal-save-close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="modal__body">
      <p class="modal__text">
        선택한 파일을 임시 저장하시겠습니까?
      </p>
      <div class="modal__file-info">
        <span class="modal__file-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
               stroke="#16a34a" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="8" y1="13" x2="16" y2="13"></line>
            <line x1="8" y1="17" x2="16" y2="17"></line>
          </svg>
        </span>
        <div>
          <div class="modal__file-name" id="modal-file-name">-</div>
          <div class="modal__file-size" id="modal-file-size">-</div>
        </div>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--outline" id="modal-save-cancel">취소</button>
      <button class="btn btn--primary" id="modal-save-ok">저장</button>
    </div>
  </div>
</div>
