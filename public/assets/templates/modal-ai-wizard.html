<div class="modal-overlay" id="modal-ai-wizard">
  <div class="modal modal--lg">
    <div class="modal__header">
      <h2 class="modal__title">AI 마법사</h2>
      <button class="modal__close" id="wizard-close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="modal__body">
      <!-- Tabs -->
      <div class="wizard__tabs">
        <button class="wizard__tab wizard__tab--active"
                data-wizard-tab="slide">PPT 슬라이드</button>
        <button class="wizard__tab"
                data-wizard-tab="approval">결재 문서</button>
      </div>

      <!-- Slide Content -->
      <div class="wizard__content" id="wizard-slide-content">
        <p class="modal__text">
          엑셀 데이터를 기반으로 PPT 슬라이드를 생성합니다.
        </p>
        <div class="slide-preview" id="slide-preview">
          <div class="slide-preview__item">슬라이드 1</div>
          <div class="slide-preview__item">슬라이드 2</div>
          <div class="slide-preview__item">슬라이드 3</div>
        </div>
      </div>

      <!-- Approval Content -->
      <div class="wizard__content hidden" id="wizard-approval-content">
        <p class="modal__text">
          엑셀 데이터를 기반으로 그룹웨어 결재 문서를 생성합니다.
        </p>
        <div class="approval-preview" id="approval-preview">
          <div class="approval-preview__title">결재 문서</div>
          <div class="approval-preview__field">
            <span class="approval-preview__label">제목</span>
            <span id="approval-title-val">-</span>
          </div>
          <div class="approval-preview__field">
            <span class="approval-preview__label">작성일</span>
            <span id="approval-date-val">-</span>
          </div>
          <div class="approval-preview__field">
            <span class="approval-preview__label">내용</span>
            <span id="approval-body-val">-</span>
          </div>
        </div>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--outline" id="wizard-cancel">취소</button>
      <button class="btn btn--primary" id="wizard-generate">
        생성하기
      </button>
    </div>
  </div>
</div>
